<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEE Aspirant Tracker AIR 1000</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           1. BASE STYLES & CORE THEME (DARK MODE)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            background-color: #0d1117;
            color: #c9d1d9;
            height: 100%;
            overflow-x: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Navigation */
        aside {
            width: 260px;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: space-between;
            z-index: 10;
        }

        .nav-brand h2 {
            color: #58a6ff;
            font-size: 1.4rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-align: center;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            margin-top: 20px;
        }

        .nav-item {
            background: none;
            border: none;
            color: #8b949e;
            padding: 12px 15px;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .nav-item:hover, .nav-item.active {
            color: #fff;
            background-color: #21262d;
        }

        .nav-item.active {
            border-left: 4px solid #58a6ff;
        }

        /* Support Button (₹10 Option) */
        .payment-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            color: #fff !important;
            padding: 10px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(255, 78, 80, 0.4);
            transition: transform 0.2s;
            margin-top: 15px;
        }
        .payment-btn:hover {
            transform: scale(1.03);
        }

        /* Main Workspace Container */
        main {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            background-color: #0d1117;
        }

        /* ==========================================================================
           2. LIVE COUNTDOWN TIMERS & HEADERS
           ========================================================================== */
        .header-section {
            background: #161b22;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-bottom: 25px;
        }

        .glitch {
            font-size: 1.1rem;
            color: #ff7b72;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-shadow: 0 0 5px rgba(255,123,114,0.2);
        }

        .countdown-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .timer-box {
            background: #21262d;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #30363d;
            text-align: center;
        }

        .timer-box h3 {
            font-size: 1rem;
            color: #58a6ff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .time-display {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .time-block {
            display: flex;
            flex-direction: column;
        }

        .time-block span:first-child {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
        }

        .time-block span:last-child {
            font-size: 0.75rem;
            color: #8b949e;
            text-transform: uppercase;
        }

        /* ==========================================================================
           3. ACCORDIONS & 3D RECTANGULAR STATUS BUBBLES
           ========================================================================== */
        .subject-section {
            margin-bottom: 30px;
        }

        .subject-section h2 {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 15px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
        }

        .accordion-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .accordion-header {
            padding: 15px;
            background: #161b22;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s ease;
        }

        .accordion-header:hover {
            background: #21262d;
        }

        .header-left-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: flex-start;
        }

        .header-left-content h4 {
            color: #fff;
            font-size: 1.05rem;
        }

        .completed-bubbles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        /* 3D Rectangular Status Bubble Styling */
        .status-bubble {
            font-size: 11px !important;
            font-weight: 600;
            text-transform: uppercase;
            color: #00ffcc;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01));
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-top: 1px solid rgba(0, 255, 204, 0.45);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.12),
                0 2px 4px rgba(0, 0, 0, 0.5),
                0 0 5px rgba(0, 255, 204, 0.15);
            transition: all 0.2s ease;
            animation: bubblePop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header-right-meta {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chapter-progress-wrapper {
            width: 100px;
            height: 6px;
            background: #30363d;
            border-radius: 3px;
            overflow: hidden;
        }

        .chapter-progress-fill {
            height: 100%;
            background: #238636;
            width: 0%;
            transition: width 0.3s ease;
        }

        .chapter-percentage-lbl {
            font-size: 0.85rem;
            color: #8b949e;
            min-width: 35px;
            text-align: right;
        }

        .accordion-header .fa-chevron-down {
            transition: transform 0.2s ease;
            color: #8b949e;
        }

        .accordion-content {
            padding: 0;
            max-height: 0;
            overflow: hidden;
            background: #0d1117;
            transition: max-height 0.25s ease-out, padding 0.25s ease;
        }

        .accordion-content.open {
            padding: 20px;
            max-height: 1000px; /* high dummy value for dynamic expands */
        }

        .checklist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        /* Checkbox custom style */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            user-select: none;
        }

        .checkbox-container input {
            display: none;
        }

        .custom-box {
            width: 18px;
            height: 18px;
            border: 2px solid #30363d;
            border-radius: 4px;
            position: relative;
            background: #161b22;
        }

        .checkbox-container input:checked + .custom-box {
            background: #238636;
            border-color: #238636;
        }

        .checkbox-container input:checked + .custom-box::after {
            content: "✔";
            position: absolute;
            color: #fff;
            font-size: 11px;
            top: -1px;
            left: 2px;
        }

        /* ==========================================================================
           4. DYNAMIC TASK PRIORITY CARDS (5-STAR & COLOR SYSTEM)
           ========================================================================== */
        .task-section {
            margin-top: 30px;
            background: #161b22;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .task-section h2 {
            color: #fff;
            margin-bottom: 15px;
        }

        .task-list {
            margin-top: 15px;
        }

        .task-card {
            border-left: 5px solid #30363d;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            background: #21262d;
            transition: all 0.3s ease;
        }

        /* Critical Priority - Red */
        .task-card.priority-critical {
            border-left-color: #ff4d4d;
            background: linear-gradient(145deg, #2b1414, #161b22);
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.15);
        }
        .task-card.priority-critical .star-filled { color: #ff4d4d; }

        /* High Priority - Orange */
        .task-card.priority-high {
            border-left-color: #ff9933;
            background: linear-gradient(145deg, #2b1f14, #161b22);
        }
        .task-card.priority-high .star-filled { color: #ff9933; }

        /* Medium Priority - Light Blue */
        .task-card.priority-medium {
            border-left-color: #00ccff;
            background: linear-gradient(145deg, #14252b, #161b22);
        }
        .task-card.priority-medium .star-filled { color: #00ccff; }

        /* Low Priority - Green */
        .task-card.priority-low {
            border-left-color: #2ecc71;
            background: linear-gradient(145deg, #142b1b, #161b22);
        }
        .task-card.priority-low .star-filled { color: #2ecc71; }

        .stars-container {
            margin-top: 8px;
            font-size: 0.9rem;
        }
        .star-empty { color: #444; }

        /* ==========================================================================
           5. MOBILE PERFORMANCE & RESPONSIVENESS STABILITY
           ========================================================================== */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column !important;
                height: auto !important;
                overflow-y: auto !important;
            }

            aside {
                width: 100% !important;
                height: auto !important;
                flex-direction: row !important;
                overflow-x: auto !important;
                white-space: nowrap !important;
                padding: 10px !important;
                position: sticky !important;
                top: 0;
                background: #161b22 !important;
            }

            .nav-brand h2 { display: none; }
            .nav-menu { flex-direction: row !important; margin-top: 0; gap: 5px; }
            .nav-item { padding: 8px 12px !important; font-size: 13px !important; }
            .payment-btn { margin-top: 0; font-size: 11px; padding: 6px 12px; }

            main { padding: 12px; }
            .countdown-container { grid-template-columns: 1fr !important; gap: 12px !important; }
            .time-block span:first-child { font-size: 1.3rem; }
            .checklist-grid { grid-template-columns: 1fr !important; }
            .status-bubble { font-size: 9px !important; padding: 2px 5px; }
        }

        @keyframes bubblePop {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside>
            <div class="nav-brand">
                <h2>ASPIRANT AIR 1000</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" aria-label="Syllabus Tracker"><i class="fa-solid fa-graduation-cap"></i> Syllabus</button>
                <button class="nav-item" aria-label="Priority Tasks"><i class="fa-solid fa-list-check"></i> Tasks List</button>
                <button class="nav-item" aria-label="Live System Monitor"><i class="fa-solid fa-terminal"></i> Console Logs</button>
            </nav>
            <a href="#" target="_blank" class="payment-btn">
                <i class="fa-solid fa-heart"></i> Support Tracker (₹10)
            </a>
        </aside>

        <main>
            <div class="header-section">
                <div class="glitch" id="motivational-glitch">LOADING MOTIVATION CORE...</div>
                <div class="countdown-container">
                    <div class="timer-box">
                        <h3>JEE Main 2027</h3>
                        <div class="time-display" id="main-countdown-box">
                            <div class="time-block"><span id="main-days">000</span><span>Days</span></div>
                            <div class="time-block"><span id="main-hours">00</span><span>Hrs</span></div>
                            <div class="time-block"><span id="main-mins">00</span><span>Min</span></div>
                            <div class="time-block"><span id="main-secs">00</span><span>Sec</span></div>
                        </div>
                    </div>
                    <div class="timer-box">
                        <h3>JEE Advanced 2027</h3>
                        <div class="time-display" id="adv-countdown-box">
                            <div class="time-block"><span id="adv-days">000</span><span>Days</span></div>
                            <div class="time-block"><span id="adv-hours">00</span><span>Hrs</span></div>
                            <div class="time-block"><span id="adv-mins">00</span><span>Min</span></div>
                            <div class="time-block"><span id="adv-secs">00</span><span>Sec</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="subject-section">
                <h2>Physics</h2>
                <div id="physics-accordion"></div>
            </div>
            <div class="subject-section">
                <h2>Chemistry</h2>
                <div id="chemistry-accordion"></div>
            </div>
            <div class="subject-section">
                <h2>Mathematics</h2>
                <div id="maths-accordion"></div>
            </div>

            <div class="task-section">
                <h2>Priority Engine Tracker</h2>
                <div class="task-list" id="global-task-list"></div>
            </div>
        </main>
    </div>

    <script>
        // Local Safe Persistent Memory State Layer
        const coreState = {
            syllabus: JSON.parse(localStorage.getItem("jee_syllabus_state")) || {},
            tasks: [
                { title: "Complete Electrostatics Modules", priority: "CRITICAL", description: "Solve last 10 years JEE Advanced questions completely." },
                { title: "Revise Organic Chemistry Nomenclature", priority: "HIGH", description: "Read short notes and check exceptions." },
                { title: "Solve Coordinate Geometry Mock Drill", priority: "MEDIUM", description: "Attempt 25 questions timed sprint test." },
                { title: "Update Tracker Formula Notebooks", priority: "LOW", description: "Add missing thermal physics equations." }
            ]
        };

        // Localized Offline Quotes Array (Lighthouse Error Resolution)
        const localMotivationalQuotes = [
            "DO NOT STOP WHEN YOU ARE EXHAUSTED. STOP ONLY WHEN THE SYLLABUS MODULE TERMINATES COMPLETELY.",
            "CONSISTENCY IS THE KEY TO BREAKING THROUGH THE AIR 1000 BARRIER.",
            "YOUR HARD WORK TODAY WILL DIRECTLY DEFINE YOUR SHIFT RESULTS TOMORROW.",
            "SAY NO TO DISTRACTIONS; YOUR DESIRED IIT CAMPUS IS CURRENTLY WAITING."
        ];

        // Dataset Engine Architecture Arrays
        const defaultChecklistItems = ["NCERT Reading", "Class Notes Revision", "JEE Main PYQs", "JEE Advanced Drill", "Short Notes Completed"];
        
        const syllabusData = {
            physics: ["Electrostatics", "Current Electricity", "Rotational Mechanics", "Thermodynamics", "Kinematics"],
            chemistry: ["Chemical Bonding", "Atomic Structure", "GOC Organic Core", "Thermodynamics & Energetics", "Coordination Compounds"],
            maths: ["Matrices & Determinants", "Definite Integration", "Probability", "Complex Numbers", "Vectors & 3D Geometry"]
        };

        // Boot Loader Initialization Router Sequence
        document.addEventListener("DOMContentLoaded", () => {
            initializeMotivationalGlitch();
            runLiveTimerLoops();
            renderSyllabusDatabaseStructures();
            renderPriorityTaskCards();
        });

        // Offline Fast Quote Display
        function initializeMotivationalGlitch() {
            const el = document.getElementById("motivational-glitch");
            if(el) {
                const randIndex = Math.floor(Math.random() * localMotivationalQuotes.length);
                el.innerText = localMotivationalQuotes[randIndex];
            }
        }

        // Live Real-Time Countdown Caching Engine Loop
        function runLiveTimerLoops() {
            const mainTarget = new Date("January 20, 2027 00:00:00").getTime();
            const advTarget = new Date("May 18, 2027 00:00:00").getTime();

            const elMainDays = document.getElementById("main-days");
            const elMainHours = document.getElementById("main-hours");
            const elMainMins = document.getElementById("main-mins");
            const elMainSecs = document.getElementById("main-secs");

            const elAdvDays = document.getElementById("adv-days");
            const elAdvHours = document.getElementById("adv-hours");
            const elAdvMins = document.getElementById("adv-mins");
            const elAdvSecs = document.getElementById("adv-secs");

            function updateTime() {
                const now = Date.now();

                // Main Countdown Calculations (Cached Math Bounds)
                let dMain = mainTarget - now;
                if (dMain > 0) {
                    elMainDays.innerText = String(Math.floor(dMain / (1000 * 60 * 60 * 24))).padStart(3, "0");
                    elMainHours.innerText = String(Math.floor((dMain % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, "0");
                    elMainMins.innerText = String(Math.floor((dMain % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, "0");
                    elMainSecs.innerText = String(Math.floor((dMain % (1000 * 60)) / 1000)).padStart(2, "0");
                }

                // Advanced Countdown Calculations (Fixed Multipliers)
                let dAdv = advTarget - now;
                if (dAdv > 0) {
                    elAdvDays.innerText = String(Math.floor(dAdv / (1000 * 60 * 60 * 24))).padStart(3, "0");
                    elAdvHours.innerText = String(Math.floor((dAdv % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, "0");
                    elAdvMins.innerText = String(Math.floor((dAdv % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, "0");
                    elAdvSecs.innerText = String(Math.floor((dAdv % (1000 * 60)) / 1000)).padStart(2, "0");
                }
            }
            setInterval(updateTime, 1000);
            updateTime();
        }

        // Accordion Builders Injection Methods
        function renderSyllabusDatabaseStructures() {
            ['physics', 'chemistry', 'maths'].forEach(subject => {
                const container = document.getElementById(`${subject}-accordion`);
                if(container) {
                    container.innerHTML = "";
                    syllabusData[subject].forEach(chapterName => {
                        container.appendChild(createChapterCard(subject, chapterName, defaultChecklistItems));
                    });
                }
            });
        }

        // Safe Error-Proof Chapter Element Builder Matrix
        function createChapterCard(subject, chapterName, checklistItems) {
            const card = document.createElement("div");
            card.className = "accordion-item";

            let totalItems = checklistItems ? checklistItems.length : 0;
            let completedCount = 0;
            let completedBubblesHTML = ""; 

            if (totalItems > 0) {
                checklistItems.forEach((item) => {
                    if (coreState && coreState.syllabus && coreState.syllabus[`${subject}_${chapterName}_${item}`]) {
                        completedCount++;
                        // Implements beautiful responsive 3D tracking tags outside directly
                        completedBubblesHTML += `<span class="status-bubble">${item}</span>`;
                    }
                });
            }
            
            let percentage = totalItems > 0 ? Math.round((completedCount / totalItems) * 100) : 0;

            card.innerHTML = `
                <div class="accordion-header" onclick="toggleAccordionElement(this)">
                    <div class="header-left-content">
                        <h4>${chapterName}</h4>
                        <div class="completed-bubbles-container">${completedBubblesHTML}</div>
                    </div>
                    <div class="header-right-meta">
                        <div class="chapter-progress-wrapper"><div class="chapter-progress-fill" style="width: ${percentage}%;"></div></div>
                        <span class="chapter-percentage-lbl">${percentage}%</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                </div>
                <div class="accordion-content">
                    <div class="checklist-grid">
                        ${totalItems > 0 ? checklistItems.map((item) => {
                            let checked = (coreState && coreState.syllabus && coreState.syllabus[`${subject}_${chapterName}_${item}`]) ? "checked" : "";
                            return `
                                <label class="checkbox-container">
                                    <input type="checkbox" ${checked} data-subj="${subject}" data-chap="${chapterName}" data-item="${item}" onchange="handleCheckboxToggle(this)">
                                    <div class="custom-box"></div>
                                    <span>${item}</span>
                                </label>
                            `;
                        }).join("") : ""}
                    </div>
                </div>
            `;
            return card;
        }

        // Open-Close Navigation Layout Methods
        function toggleAccordionElement(headerElement) {
            const content = headerElement.nextElementSibling;
            content.classList.toggle("open");
            const icon = headerElement.querySelector(".fa-chevron-down");
            if (icon) {
                icon.style.transform = content.classList.contains("open") ? "rotate(180deg)" : "rotate(0deg)";
            }
        }

        // Live Safe Checkbox Event Listeners Interceptors
        function handleCheckboxToggle(checkbox) {
            const { subj, chap, item } = checkbox.dataset;
            const compoundKey = `${subj}_${chap}_${item}`;
            
            if(!coreState.syllabus) coreState.syllabus = {};
            coreState.syllabus[compoundKey] = checkbox.checked;
            
            // Persist locally instantly
            localStorage.setItem("jee_syllabus_state", JSON.stringify(coreState.syllabus));

            const card = checkbox.closest(".accordion-item");
            const boxes = card.querySelectorAll(".checklist-grid input");
            let completed = 0;
            
            const bubblesContainer = card.querySelector(".completed-bubbles-container");
            let newBubblesHTML = "";

            boxes.forEach((b) => {
                if (b.checked) {
                    completed++;
                    newBubblesHTML += `<span class="status-bubble">${b.dataset.item}</span>`;
                }
            });
            
            if (bubblesContainer) {
                bubblesContainer.innerHTML = newBubblesHTML;
            }

            let percentage = Math.round((completed / boxes.length) * 100);
            card.querySelector(".chapter-progress-fill").style.width = `${percentage}%`;
            card.querySelector(".chapter-percentage-lbl").innerText = `${percentage}%`;
        }

        // Priority Color Renderer Matrix Functions
        function renderPriorityTaskCards() {
            const taskContainer = document.getElementById("global-task-list");
            if(!taskContainer) return;

            const priorityConfigs = {
                'CRITICAL': { stars: 5, className: 'priority-critical' },
                'HIGH':     { stars: 4, className: 'priority-high' },
                'MEDIUM':   { stars: 3, className: 'priority-medium' },
                'LOW':      { stars: 1, className: 'priority-low' }
            };

            taskContainer.innerHTML = coreState.tasks.map(task => {
                const config = priorityConfigs[task.priority] || { stars: 0, className: '' };
                
                // Building stars loop architectures safely
                let starsHTML = '';
                for (let i = 0; i < config.stars; i++) starsHTML += '<i class="fa-solid fa-star star-filled"></i> ';
                for (let i = config.stars; i < 5; i++) starsHTML += '<i class="fa-regular fa-star star-empty"></i> ';

                return `
                    <div class="task-card ${config.className}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong style="color:#fff;">${task.title}</strong>
                            <span style="font-size:0.75rem; font-weight:bold; letter-spacing:0.5px;">${task.priority}</span>
                        </div>
                        <p style="font-size:0.85rem; color:#8b949e; margin-top:5px;">${task.description}</p>
                        <div class="stars-container">${starsHTML}</div>
                    </div>
                `;
            }).join("");
        }
    </script>
</body>
</html>
